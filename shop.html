<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Films By Kelly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #e8000d;
      --red-dim: #a50009;
      --black: #0a0a0a;
      --dark: #111111;
      --card-bg: #191919;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: #888;
      --nav-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV (shared) ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      z-index: 1000;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--red);
      letter-spacing: 2px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #bbb;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 2px;
      background: var(--red);
      transition: width 0.25s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: #fff; }
    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }

    .nav-cart-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: #bbb;
      padding: 6px 14px;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .nav-cart-btn:hover { border-color: var(--red); color: #fff; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: #fff;
      transition: all 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-height); left: 0; right: 0;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 5%;
      flex-direction: column;
      gap: 1.2rem;
      z-index: 999;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: #bbb;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      transition: color 0.2s;
    }

    .mobile-menu a:hover { color: var(--red); }

    /* ── PAGE CONTENT ── */
    .page-header {
      padding-top: calc(var(--nav-height) + 3rem);
      padding-left: 5%;
      padding-right: 5%;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .page-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 0.03em;
    }

    /* ── SHOP GRID ── */
    .shop-section {
      padding: 3rem 5%;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .product-card {
      background: var(--dark);
      overflow: hidden;
      transition: background 0.2s;
      cursor: pointer;
    }

    .product-card:hover { background: var(--card-bg); }

    .product-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      background: #1a1a1a;
    }

    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-img-wrap img {
      transform: scale(1.04);
    }

    .product-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--muted);
      background: #161616;
    }

    .product-info {
      padding: 1.2rem;
    }

    .product-info h3 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .product-price {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .product-price strong {
      color: var(--text);
      font-size: 1.05rem;
    }

    .add-to-cart-btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }

    .add-to-cart-btn:hover { background: var(--red-dim); }
    .add-to-cart-btn.added {
      background: #1a6b2a;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1a6b2a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 2000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      border-top: 1px solid var(--border);
      padding: 2rem 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer p { font-size: 0.85rem; color: var(--muted); }
    footer a { color: var(--red); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .nav-links, .nav-cart-btn { display: none; }
      .hamburger { display: flex; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Films By Kelly</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="films.html">Films</a></li>
      <li><a href="artwork.html">Artwork</a></li>
      <li><a href="shop.html" class="active">Shop</a></li>
      <li><a href="contacts.html">Contact</a></li>
    </ul>
    <a href="cart.html" class="nav-cart-btn">🛒 Cart <span id="nav-cart-count">(0)</span></a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="films.html">Films</a>
    <a href="artwork.html">Artwork</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="contacts.html">Contact</a>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="page-label">Merch & Prints</p>
    <h1 class="page-title">Shop</h1>
  </div>

  <!-- PRODUCTS -->
  <section class="shop-section">
    <div class="product-grid" id="product-grid">
      <!-- Products rendered by JS -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 Kelvin Mutua · Films By Kelly. All rights reserved.</p>
    <p><a href="contacts.html">Get in touch</a> · <a href="#">Privacy Policy</a></p>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="toast">✓ Added to cart!</div>

  <script>
    // ── Product catalogue (update names/images/prices as needed) ──
    const products = [
      { id: 1, name: 'Merch Item 1',  price: 1000, image: 'images/MRECH 1.jpg' },
      { id: 2, name: 'Merch Item 2',  price: 2000, image: 'images/MERCH 2.jpg' },
      { id: 3, name: 'Merch Item 3',  price: 1500, image: 'images/MERCH 3.jpg' },
      { id: 4, name: 'Merch Item 4',  price: 2500, image: 'images/MERCH 4.jpg' },
      { id: 5, name: 'Limited Print', price: 3000, image: null },
      { id: 6, name: 'Photo Book',    price: 1800, image: null },
    ];

    // ── Render products ──
    const grid = document.getElementById('product-grid');

    products.forEach(p => {
      const imgHtml = p.image
        ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\'product-img-placeholder\'>🎬</div>'">`
        : `<div class="product-img-placeholder">🎬</div>`;

      grid.innerHTML += `
        <div class="product-card">
          <div class="product-img-wrap">${imgHtml}</div>
          <div class="product-info">
            <h3>${p.name}</h3>
            <p class="product-price">KES <strong>${p.price.toLocaleString()}</strong></p>
            <button class="add-to-cart-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">
              Add to Cart
            </button>
          </div>
        </div>
      `;
    });

    // ── Cart logic ──
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      const existing = cart.find(item => item.id === productId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 });
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      updateNavCount();
      showToast(`${product.name} added to cart!`);

      // Visual feedback on button
      const btn = document.getElementById(`btn-${productId}`);
      btn.textContent = '✓ Added!';
      btn.classList.add('added');
      setTimeout(() => {
        btn.textContent = 'Add to Cart';
        btn.classList.remove('added');
      }, 1500);
    }

    function updateNavCount() {
      const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      document.getElementById('nav-cart-count').textContent = total > 0 ? `(${total})` : '(0)';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = `✓ ${msg}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Init
    updateNavCount();

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      });
    });
  </script>
</body>
</html>
